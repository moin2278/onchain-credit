name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
      - name: Guard against committed secrets
        run: |
          if grep -rInE "apikey\s*=\s*['\"][A-Z0-9]{20,}" --include="*.py" --include="*.ipynb" .; then
            echo "Possible hardcoded API key found"; exit 1; fi
